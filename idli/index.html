<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="keywords" content="idli surat, breakfast in surat, steamed idli adajan, idli delivery surat" />

    <meta property="og:image" content="../idli.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Idli in Surat | Mammi's Kitchen" />
    <meta name="twitter:description" content="Order fresh Idli delivery in Surat from Mammi's Kitchen." />
    <meta name="twitter:image" content="../idli.png" />
    <link rel="canonical" href="idli/" />

    <link rel="icon" type="image/png" href="../mammiskitchennobg.png" />
    <link rel="apple-touch-icon" href="../mammiskitchennobg.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="top-nav" aria-label="Main navigation">
      <div class="nav-inner">
        <a class="brand" href="../index.html" aria-label="Mammi's Kitchen Home">
          <span class="logo-wrap">
            <img src="../mammiskitchennobg.png" alt="Mammi's Kitchen logo" />
          </span>
          <span class="brand-copy">
            <strong>Mammi's Kitchen</strong>
            <small>Cloud Kitchen In Surat</small>
          </span>
        </a>
        <div class="nav-call-wrap" aria-label="Call options">
          <a class="nav-call" href="tel:+919016177305">Call Now: +91 90161 77305</a>
          <details class="call-dropdown">
            <summary class="call-toggle" aria-label="More call options">▾</summary>
            <div class="call-menu" role="menu">
              <a role="menuitem" href="tel:+919106663804">Call: +91 91066 63804</a>
              <a role="menuitem" href="tel:+919375479114">Call: +91 93754 79114</a>
            </div>
          </details>
        </div>
      </div>
    </header>

    <main class="page">
      <div class="page-actions"><a class="btn-secondary" href="../index.html">Back to Menu</a></div>
      <section class="item-detail-page" aria-label="Idli details">
        <div class="item-detail-grid">
          <div class="item-image-wrap"><img src="../idli.png" alt="Idli from Mammi's Kitchen" /></div>
          <article class="item-detail-card">
            <p class="item-badge">Breakfast</p>
            <h1>Idli</h1>
            <p class="item-description">Fresh steamed idli served soft and warm with classic sides.</p>
            <p class="item-price">Rs 149</p>
            <h2>Includes</h2>
            <ul class="item-includes">
              <li>Coconut chutney</li>
              <li>Green chutney</li>
            </ul>
            <div class="detail-cta-row"><a class="btn-primary" href="tel:+919016177305">Call to Order</a></div>
          </article>
        </div>
      </section>
    </main>

    <script>
      document.addEventListener("click", (event) => {
        const openDropdowns = document.querySelectorAll(".call-dropdown[open]");
        if (!openDropdowns.length) {
          return;
        }
        openDropdowns.forEach((dropdown) => {
          if (!dropdown.contains(event.target)) {
            dropdown.removeAttribute("open");
          }
        });
      });

      document.addEventListener("keydown", (event) => {
        if (event.key !== "Escape") {
          return;
        }
        document.querySelectorAll(".call-dropdown[open]").forEach((dropdown) => {
          dropdown.removeAttribute("open");
        });
      });
    </script>
  </body>
</html>
