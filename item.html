<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Item Details | Mammi's Kitchen</title>
    <meta name="description" content="View item details and call Mammi's Kitchen to order." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Item Details | Mammi's Kitchen" />
    <meta property="og:description" content="View item details and call Mammi's Kitchen to order." />
    <meta property="og:url" content="item.html" />
    <meta property="og:image" content="enhanced-version.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Item Details | Mammi's Kitchen" />
    <meta name="twitter:description" content="View item details and call Mammi's Kitchen to order." />
    <meta name="twitter:image" content="enhanced-version.png" />
    <link rel="canonical" href="item.html" id="canonical-url" />
    <link rel="icon" type="image/png" href="mammiskitchennobg.png" />
    <link rel="apple-touch-icon" href="mammiskitchennobg.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-nav" aria-label="Main navigation">
      <div class="nav-inner">
        <a class="brand" href="index.html" aria-label="Mammi's Kitchen Home">
          <span class="logo-wrap">
            <img src="mammiskitchennobg.png" alt="Mammi's Kitchen logo" />
          </span>
          <span class="brand-copy">
            <strong>Mammi's Kitchen</strong>
            <small>Surat Cloud Kitchen</small>
          </span>
        </a>
        <div class="nav-call-wrap" aria-label="Call options">
          <a class="nav-call" href="tel:+919016177305">Call Now: +91 90161 77305</a>
          <details class="call-dropdown">
            <summary class="call-toggle" aria-label="More call options">▾</summary>
            <div class="call-menu" role="menu">
              <a role="menuitem" href="tel:+919106663804">Call: +91 91066 63804</a>
              <a role="menuitem" href="tel:+919375479114">Call: +91 93754 79114</a>
            </div>
          </details>
        </div>
      </div>
    </header>

    <main class="page">
      <div class="page-actions">
        <a class="btn-secondary" href="index.html">Back to Menu</a>
      </div>
      <section class="item-detail-page" aria-label="Item details">
        <div class="item-detail-grid">
          <div class="item-image-wrap">
            <img id="item-image" alt="" hidden />
            <div id="item-image-fallback" class="item-image-fallback" hidden></div>
          </div>

          <article class="item-detail-card">
            <p id="item-category" class="item-badge"></p>
            <h1 id="item-title"></h1>
            <p id="item-description" class="item-description"></p>
            <p id="item-price" class="item-price"></p>

            <h2>Includes</h2>
            <ul id="item-includes" class="item-includes"></ul>

            <div class="detail-cta-row">
              <a class="btn-primary" href="tel:+919016177305">Call to Order</a>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script>
      const canonicalEl = document.getElementById("canonical-url");
      if (canonicalEl) {
        canonicalEl.href = window.location.href;
      }

      document.addEventListener("click", (event) => {
        const openDropdowns = document.querySelectorAll(".call-dropdown[open]");
        if (!openDropdowns.length) {
          return;
        }
        openDropdowns.forEach((dropdown) => {
          if (!dropdown.contains(event.target)) {
            dropdown.removeAttribute("open");
          }
        });
      });

      document.addEventListener("keydown", (event) => {
        if (event.key !== "Escape") {
          return;
        }
        document.querySelectorAll(".call-dropdown[open]").forEach((dropdown) => {
          dropdown.removeAttribute("open");
        });
      });

      const itemData = {
        "budget-thali": {
          title: "Budget Thali",
          category: "Popular Thali",
          price: "Rs 149",
          description: "Balanced everyday meal with homestyle flavor and great value.",
          image: "budget_thali.png",
          includes: ["5 rotli", "1 sabzi", "dal", "rice", "salad", "papad"]
        },
        "full-meal-thali": {
          title: "Full Meal Thali",
          category: "Premium Thali",
          price: "Rs 249",
          description: "Complete family-style thali for a fuller, satisfying lunch or dinner.",
          image: "full_meal_thali.png",
          includes: ["7 rotli", "2 sabzi", "dal", "rice", "sweet", "salad", "papad", "chhas"]
        },
        dhokla: {
          title: "Dhokla",
          category: "Gujarati Snacks",
          price: "Rs 60",
          description: "Soft and spongy steamed dhokla, lightly tempered for authentic taste.",
          image: "dhokla.png",
          includes: ["Green chutney", "Fried green chili", "Seasoning tadka"]
        },
        idli: {
          title: "Idli",
          category: "Breakfast",
          price: "Rs 70",
          description: "Fresh steamed idli served soft and warm with classic sides.",
          image: "idli.png",
          includes: ["Coconut chutney", "Sambar", "Masala podi"]
        },
        locho: {
          title: "Locho",
          category: "Surti Special",
          price: "Rs 80",
          description: "Surat style locho topped with masala, sev, onion and tangy chutney.",
          image: "locho.png",
          includes: ["Special masala", "Sev topping", "Chutney"]
        },
        thepla: {
          title: "Thepla",
          category: "Gujarati Flatbread",
          price: "Rs 65",
          description: "Fresh methi thepla made soft and flavorful, ideal for any meal.",
          image: "thepla.png",
          includes: ["Pickle", "Curd dip", "Masala tea pairing optional"]
        }
      };

      const params = new URLSearchParams(window.location.search);
      const itemKey = params.get("item") || "budget-thali";
      const data = itemData[itemKey] || itemData["budget-thali"];

      const titleEl = document.getElementById("item-title");
      const categoryEl = document.getElementById("item-category");
      const descEl = document.getElementById("item-description");
      const priceEl = document.getElementById("item-price");
      const includesEl = document.getElementById("item-includes");
      const imageEl = document.getElementById("item-image");
      const fallbackEl = document.getElementById("item-image-fallback");

      titleEl.textContent = data.title;
      categoryEl.textContent = data.category;
      descEl.textContent = data.description;
      priceEl.textContent = data.price;
      document.title = data.title + " | Mammi's Kitchen";

      const metaDescription = document.querySelector('meta[name="description"]');
      if (metaDescription) {
        metaDescription.setAttribute(
          "content",
          `${data.title} - ${data.description} Call Mammi's Kitchen to order.`
        );
      }

      const ogTitle = document.querySelector('meta[property="og:title"]');
      const ogDescription = document.querySelector('meta[property="og:description"]');
      const ogUrl = document.querySelector('meta[property="og:url"]');
      const ogImage = document.querySelector('meta[property="og:image"]');
      const twitterTitle = document.querySelector('meta[name="twitter:title"]');
      const twitterDescription = document.querySelector('meta[name="twitter:description"]');
      const twitterImage = document.querySelector('meta[name="twitter:image"]');

      if (ogTitle) ogTitle.setAttribute("content", `${data.title} | Mammi's Kitchen`);
      if (ogDescription) ogDescription.setAttribute("content", data.description);
      if (ogUrl) ogUrl.setAttribute("content", window.location.href);
      if (ogImage && data.image) ogImage.setAttribute("content", data.image);
      if (twitterTitle) twitterTitle.setAttribute("content", `${data.title} | Mammi's Kitchen`);
      if (twitterDescription) twitterDescription.setAttribute("content", data.description);
      if (twitterImage && data.image) twitterImage.setAttribute("content", data.image);

      const priceValue = Number(String(data.price).replace(/[^\d.]/g, ""));
      const itemSchema = {
        "@context": "https://schema.org",
        "@type": "MenuItem",
        name: data.title,
        description: data.description,
        image: data.image ? data.image : undefined,
        offers: priceValue
          ? {
              "@type": "Offer",
              priceCurrency: "INR",
              price: priceValue
            }
          : undefined
      };

      const jsonLdEl = document.createElement("script");
      jsonLdEl.type = "application/ld+json";
      jsonLdEl.textContent = JSON.stringify(itemSchema);
      document.head.appendChild(jsonLdEl);

      data.includes.forEach((entry) => {
        const li = document.createElement("li");
        li.textContent = entry;
        includesEl.appendChild(li);
      });

      if (data.image) {
        imageEl.src = data.image;
        imageEl.alt = data.title;
        imageEl.hidden = false;
        fallbackEl.hidden = true;
      } else {
        imageEl.hidden = true;
        fallbackEl.hidden = false;
        fallbackEl.textContent = data.title;
      }
    </script>
  </body>
</html>
